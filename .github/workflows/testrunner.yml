name: Test Runner
on:
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'
      - name: grant perms
        run: chmod +x ./src/test/java/com/spartawebtest/runner/Runner.java
      - name: Run tests
        run: ./src/test/java/com/spartawebtest/runner/Runner.java
